<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siddharth Singh</title>

<!-- Meta Pixel Code Paste Here Later -->

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

@keyframes glow{
from{
text-shadow: 0 0 5px #ffd54f, 0 0 10px #ffd54f, 0 0 20px #ff9900;
}
to{
text-shadow: 0 0 10px #fff176, 0 0 20px #ffd54f, 0 0 35px #ff9800, 0 0 50px #ff6600;
}
}

body{
background:#b30000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
text-align:center;
color:white;
}

h1{
font-size:32px;
color:#ffd54f;
margin-bottom:25px;
font-weight:bold;
text-shadow: 0 0 5px #ffd54f, 0 0 10px #ffd54f, 0 0 20px #ff9900, 0 0 35px #ff6600;
animation: glow 1.5s infinite alternate;
}

.card{
background:white;
border-radius:30px;
padding:15px;
overflow:hidden;
margin-bottom:25px;
}

.card img{
width:100%;
border-radius:20px;
}

h2{
font-size:24px;
margin-bottom:25px;
}

.btn{
display:block;
background:#1e73ff;
color:white;
text-decoration:none;
padding:18px;
border-radius:40px;
font-size:24px;
font-weight:bold;
box-shadow:0 8px 0 rgba(0,0,0,0.3);
margin-bottom:20px;
}

.countdown{
font-size:20px;
font-weight:bold;
color:#ffd54f;
}
</style>
</head>

<body>

<div class="container">
<h1>NARAK KA RAJA</h1>

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="Photo">
</div>

<h2>EARN WITH SIDDHARTH</h2>

<a href="https://t.me/YOURCHANNEL" class="btn">JOIN FREE TELEGRAM</a>

<div class="countdown">
Redirecting in <span id="timer">3</span> sec...
</div>
</div>

<script>
let time = 3;
let timer = document.getElementById("timer");

let countdown = setInterval(() => {
time--;
timer.innerText = time;

if(time <= 0){
clearInterval(countdown);
window.location.href = "https://t.me/YOURCHANNEL";
}
},1000);
</script>

</body>
</html>
